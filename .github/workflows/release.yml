name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build Release Package
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: make resolve-packages

      - name: Run unit tests
        run: make test

      - name: Build downloadable app package
        run: make package

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoicePen-macOS-unsigned
          path: /private/tmp/VoicePenDerivedData/Package/VoicePen-macOS-unsigned.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: /private/tmp/VoicePenDerivedData/Package/VoicePen-macOS-unsigned.zip
          prerelease: true
