name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Release Package
    runs-on: macos-26
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Restore Swift build cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/org.swift.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            /private/tmp/VoicePenDerivedData/SourcePackages
            /private/tmp/VoicePenDerivedData/Build/Intermediates.noindex
          key: ${{ runner.os }}-${{ runner.arch }}-swift-${{ hashFiles('Package.swift', 'Package.resolved', 'VoicePen.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swift-

      - name: Validate release secrets
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          MACOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.MACOS_SIGNING_CERTIFICATE_BASE64 }}
          MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          test -n "$SPARKLE_PRIVATE_KEY"
          test -n "$MACOS_SIGNING_CERTIFICATE_BASE64"
          test -n "$MACOS_SIGNING_CERTIFICATE_PASSWORD"
          test -n "$MACOS_SIGNING_IDENTITY"

      - name: Import release signing certificate
        env:
          MACOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.MACOS_SIGNING_CERTIFICATE_BASE64 }}
          MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          certificate_path="$RUNNER_TEMP/voicepen-release-signing.p12"
          trusted_certificate_path="$RUNNER_TEMP/voicepen-release-signing.cer"
          keychain_path="$RUNNER_TEMP/voicepen-release-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf "%s" "$MACOS_SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$MACOS_SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security find-certificate -c "$MACOS_SIGNING_IDENTITY" -p "$keychain_path" > "$trusted_certificate_path"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain "$trusted_certificate_path"
          original_keychains="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$keychain_path" $original_keychains
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Run unit tests
        run: make test

      - name: Build downloadable app package
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: make package CODESIGN_IDENTITY="$MACOS_SIGNING_IDENTITY"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoicePen-macOS-unsigned
          path: /private/tmp/VoicePenDerivedData/Package/VoicePen-macOS-unsigned.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: /private/tmp/VoicePenDerivedData/Package/VoicePen-macOS-unsigned.zip
          prerelease: true

      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p public
          archive="/private/tmp/VoicePenDerivedData/Package/VoicePen-macOS-unsigned.zip"
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/VoicePen-macOS-unsigned.zip"
          scripts/generate-appcast.sh "$archive" "$download_url" public/appcast.xml

      - name: Upload GitHub Pages artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages appcast
        if: startsWith(github.ref, 'refs/tags/')
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Delete release signing keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/voicepen-release-signing.keychain-db" || true
