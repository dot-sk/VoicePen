name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  pages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Release Package
    runs-on: macos-26
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Validate Sparkle update keys
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          test -n "$SPARKLE_PRIVATE_KEY"

      - name: Resolve Swift packages
        run: make resolve-packages

      - name: Run unit tests
        run: make test

      - name: Build downloadable app package
        run: make package

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoicePen-macOS-unsigned
          path: /private/tmp/VoicePenDerivedData/Package/VoicePen-macOS-unsigned.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: /private/tmp/VoicePenDerivedData/Package/VoicePen-macOS-unsigned.zip
          prerelease: true

      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p public
          archive="/private/tmp/VoicePenDerivedData/Package/VoicePen-macOS-unsigned.zip"
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/VoicePen-macOS-unsigned.zip"
          scripts/generate-appcast.sh "$archive" "$download_url" public/appcast.xml

      - name: Upload GitHub Pages artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages appcast
        if: startsWith(github.ref, 'refs/tags/')
        id: deployment
        uses: actions/deploy-pages@v4
