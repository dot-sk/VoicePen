name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Changed Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect code-impacting changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            printf "code=true\n" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$base" =~ ^0+$ ]]; then
            printf "code=true\n" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$base" "$head" > changed-files.txt

          if grep -Eq '^(\.github/workflows/ci\.yml|\.periphery\.yml|\.swift-format|\.swiftlint\.yml|Makefile|Package\.resolved|Package\.swift|scripts/|VoicePen(\.xcodeproj|IntegrationTests|Tests|UITests)?/)' changed-files.txt; then
            printf "code=true\n" >> "$GITHUB_OUTPUT"
          else
            printf "code=false\n" >> "$GITHUB_OUTPUT"
          fi

  quality-test:
    name: Quality and Unit Tests
    runs-on: macos-26
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version
          xcrun swift-format --version

      - name: Install lint tools
        run: brew install swiftlint

      - name: Run lint checks
        run: make lint

      - name: Run unit tests
        run: make test

  dead-code:
    name: Dead Code
    runs-on: macos-26
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run unused-code analysis
        run: make dead-code
