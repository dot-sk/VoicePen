name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_dead_code:
        description: Run optional Periphery dead-code analysis
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Changed Files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}
      specs: ${{ steps.detect.outputs.specs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect code-impacting changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            printf "code=true\n" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$base" =~ ^0+$ ]]; then
            printf "code=true\n" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-only "$base" "$head" > changed-files.txt

          if scripts/code-impacting-changes.sh changed-files.txt; then
            printf "code=true\n" >> "$GITHUB_OUTPUT"
          else
            printf "code=false\n" >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '^(Specs/|scripts/validate-specs\.sh$)' changed-files.txt; then
            printf "specs=true\n" >> "$GITHUB_OUTPUT"
          else
            printf "specs=false\n" >> "$GITHUB_OUTPUT"
          fi

  spec-validation:
    name: Spec Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.specs == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate specs
        run: make validate-specs

  quality-test:
    name: Quality and Unit Tests
    runs-on: macos-26
    timeout-minutes: 30
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version
          xcrun swift-format --version

      - name: Restore Swift build cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            .swiftlint-cache
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-swift-${{ hashFiles('Package.swift', 'Package.resolved', 'VoicePen.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swift-

      - name: Install lint tools
        run: brew install swiftlint

      - name: Run lint checks
        run: make lint

      - name: Run unit tests
        run: make test

  dead-code:
    name: Dead Code
    runs-on: macos-26
    timeout-minutes: 30
    needs: changes
    if: github.event_name == 'workflow_dispatch' && inputs.run_dead_code == true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Restore Swift build cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-swift-${{ hashFiles('Package.swift', 'Package.resolved', 'VoicePen.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swift-

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Run unused-code analysis
        run: make dead-code
